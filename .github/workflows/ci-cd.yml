name: CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout Sibling Dependencies
      - name: Checkout Distributed-Config
        uses: actions/checkout@v4
        with:
          repository: Bastien-Antigravity/distributed-config
          path: distributed-config

      - name: Checkout Flexible-Logger
        uses: actions/checkout@v4
        with:
          repository: Bastien-Antigravity/flexible-logger
          path: flexible-logger

      # 2. Checkout Current Project
      - name: Checkout Distconf-Flexlog
        uses: actions/checkout@v4
        with:
          path: universal-logger

      # 3. Setup Go
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: universal-logger/go.sum

      # 4. Run Tests
      # We move into the universal-logger directory but the 'replace' 
      # directives ../distributed-config and ../flexible-logger 
      # will resolve correctly because they are siblings in the runner workspace.
      - name: Run Facade Integration Tests
        working-directory: universal-logger
        run: |
          go mod tidy
          go test -v ./src/...

      - name: Verify CLI Compilation
        working-directory: universal-logger
        run: |
          go build ./cmd/universal-logger/main.go